// Veilio Exchange – five-participant Canton Sandbox on a shared synchronizer.

canton {
  sequencers {
    sequencer1 {
      storage.type = memory
      public-api.port = 5001
      admin-api.port = 5002
      sequencer {
        type = reference
        config {
          storage.type = memory
        }
      }
    }
  }

  mediators {
    mediator1 {
      storage.type = memory
      admin-api.port = 5202
    }
  }

  participants {
    participant1 {
      storage.type = memory
      admin-api.port = 5012
      ledger-api {
        port = 5011
        user-management-service.enabled = true
      }
      http-ledger-api.port = 5013
    }

    participant2 {
      storage.type = memory
      admin-api.port = 5022
      ledger-api {
        port = 5021
        user-management-service.enabled = true
      }
      http-ledger-api.port = 5023
    }

    participant3 {
      storage.type = memory
      admin-api.port = 5032
      ledger-api {
        port = 5031
        user-management-service.enabled = true
      }
      http-ledger-api.port = 5033
    }

    participant4 {
      storage.type = memory
      admin-api.port = 5042
      ledger-api {
        port = 5041
        user-management-service.enabled = true
      }
      http-ledger-api.port = 5043
    }

    participant5 {
      storage.type = memory
      admin-api.port = 5052
      ledger-api {
        port = 5051
        user-management-service.enabled = true
      }
      http-ledger-api.port = 5053
    }
  }
}
