name: veilio-exchange

services:
  postgres:
    image: postgres:16-alpine
    container_name: veilio-postgres
    environment:
      POSTGRES_USER: veilio
      POSTGRES_PASSWORD: veilio
      POSTGRES_DB: veilio_exchange
    volumes:
      - veilio_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veilio -d veilio_exchange"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  canton:
    build:
      context: .
      dockerfile: deploy/canton/Dockerfile
    container_name: veilio-canton
    volumes:
      - canton_shared:/shared
    ports:
      - "5011:5011"
      - "5013:5013"
      - "5021:5021"
      - "5023:5023"
      - "5031:5031"
      - "5033:5033"
      - "5041:5041"
      - "5043:5043"
      - "5051:5051"
      - "5053:5053"
    healthcheck:
      test: ["CMD-SHELL", "test -f /shared/.canton-ready"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 120s
    restart: unless-stopped

  canton-bootstrap:
    build:
      context: .
      dockerfile: deploy/backend/Dockerfile
    container_name: veilio-canton-bootstrap
    environment:
      CANTON_MODE: ${CANTON_MODE:-local}
      CANTON_PUBLIC_BOOTSTRAP_ENABLED: ${CANTON_PUBLIC_BOOTSTRAP_ENABLED:-false}
      CANTON_PUBLIC_WRITE_PARTICIPANTS_CONFIG: ${CANTON_PUBLIC_WRITE_PARTICIPANTS_CONFIG:-true}
      CANTON_PUBLIC_AUTO_ALLOCATE: ${CANTON_PUBLIC_AUTO_ALLOCATE:-false}
      CANTON_PUBLIC_PARTY_MAPPINGS_JSON: ${CANTON_PUBLIC_PARTY_MAPPINGS_JSON:-{}}
      CANTON_PUBLIC_BANKS_JSON: ${CANTON_PUBLIC_BANKS_JSON:-[]}
      CANTON_BOOTSTRAP_READY_FILE: /shared/.canton-ready
      PARTICIPANTS_CONFIG: /shared/participants.json
      CANTON_PARTICIPANT1_JSON_URL: ${CANTON_PARTICIPANT1_JSON_URL:-http://canton:5013}
      CANTON_PARTICIPANT2_JSON_URL: ${CANTON_PARTICIPANT2_JSON_URL:-http://canton:5023}
      CANTON_PARTICIPANT3_JSON_URL: ${CANTON_PARTICIPANT3_JSON_URL:-http://canton:5033}
      CANTON_PARTICIPANT4_JSON_URL: ${CANTON_PARTICIPANT4_JSON_URL:-http://canton:5043}
      CANTON_PARTICIPANT5_JSON_URL: ${CANTON_PARTICIPANT5_JSON_URL:-http://canton:5053}
      CANTON_USE_JWT: ${CANTON_USE_JWT:-false}
      CANTON_JWT_SECRET: ${CANTON_JWT_SECRET:-veilio-dev-secret}
    entrypoint: ["node", "dist/bootstrap/public-bootstrap.js"]
    volumes:
      - canton_shared:/shared
    depends_on:
      canton:
        condition: service_healthy
        required: false
      postgres:
        condition: service_healthy
        required: false
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: deploy/backend/Dockerfile
    container_name: veilio-backend
    environment:
      PORT: "3001"
      DATABASE_URL: postgres://veilio:veilio@postgres:5432/veilio_exchange
      CANTON_MODE: ${CANTON_MODE:-local}
      CANTON_PARTICIPANT1_JSON_URL: ${CANTON_PARTICIPANT1_JSON_URL:-http://canton:5013}
      CANTON_PARTICIPANT2_JSON_URL: ${CANTON_PARTICIPANT2_JSON_URL:-http://canton:5023}
      CANTON_PARTICIPANT3_JSON_URL: ${CANTON_PARTICIPANT3_JSON_URL:-http://canton:5033}
      CANTON_PARTICIPANT4_JSON_URL: ${CANTON_PARTICIPANT4_JSON_URL:-http://canton:5043}
      CANTON_PARTICIPANT5_JSON_URL: ${CANTON_PARTICIPANT5_JSON_URL:-http://canton:5053}
      CANTON_BOOTSTRAP_READY_FILE: /shared/.canton-ready
      PARTICIPANTS_CONFIG: /shared/participants.json
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      AUTH_REQUIRED: ${AUTH_REQUIRED:-false}
      AUTH_DEV_TOKEN_MINT: ${AUTH_DEV_TOKEN_MINT:-true}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-veilio-dev-secret}
      OBJECT_STORAGE_LOCAL_ROOT: /app/object-store
      OBJECT_STORAGE_PUBLIC_BASE_URL: ${OBJECT_STORAGE_PUBLIC_BASE_URL:-http://localhost:3001}
    volumes:
      - canton_shared:/shared:ro
      - backend_object_store:/app/object-store
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      canton-bootstrap:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:3001/api/health/live >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: deploy/frontend/Dockerfile
      args:
        BACKEND_URL: http://backend:3001
    container_name: veilio-frontend
    environment:
      BACKEND_URL: http://backend:3001
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  veilio_pg_data:
  canton_shared:
  backend_object_store:
